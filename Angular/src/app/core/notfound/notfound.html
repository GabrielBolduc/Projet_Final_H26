<div class="error-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>404</mat-card-title>
      <mat-card-subtitle>{{'404.NOT_FOUND' | translate}}</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <p>{{'404.MESSAGE' | translate}}</p>
    </mat-card-content>

    <mat-card-actions align="end">
      <a mat-flat-button color="tertiary" routerLink="/">
        {{'404.BTN' | translate}}
      </a>
    </mat-card-actions>
  </mat-card>
</div>

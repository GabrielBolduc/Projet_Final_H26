<h2 mat-dialog-title>
  {{ isEditMode ? 'Modifier Affectation' : 'Nouvelle Affectation' }}

 
</h2>

<mat-dialog-content>

  <form [formGroup]="form">

    <mat-form-field appearance="outline" class="full-width">

      <mat-label>Début prévu</mat-label>

      <input
        matInput
        type="datetime-local"
        formControlName="expected_start">

      <mat-icon matSuffix>schedule</mat-icon>

    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">

      <mat-label>Fin prévue</mat-label>

      <input
        matInput
        type="datetime-local"
        formControlName="expected_end">

    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">

      <mat-label>Responsabilité</mat-label>

      <textarea
        matInput
        rows="3"
        formControlName="responsability">
      </textarea>

      <mat-icon matSuffix>assignment</mat-icon>

    </mat-form-field>


    <mat-form-field appearance="outline" class="full-width">

      <mat-label>Utilisateur</mat-label>

      <mat-select formControlName="user_id">

        @for (user of filteredUsers(); track user.id) {

          <mat-option [value]="user.id">
            {{ user.name }} — {{ user.ability }}
          </mat-option>

        }

      </mat-select>

    </mat-form-field>

  </form>

</mat-dialog-content>


<mat-dialog-actions align="end">

  <button mat-button (click)="close()">
    Annuler
  </button>

  <button
    mat-flat-button
    color="primary"
    [disabled]="form.invalid"
    (click)="submit()">

    Enregistrer

  </button>

</mat-dialog-actions>
